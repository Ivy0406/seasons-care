name: Deploy to GitHub Pages

on:
  push:
    branches:
      - chore/deploy-workflows
  workflow_dispatch: # 允許手動點擊按鈕部署，以便除錯

permissions:
  contents: read
  pages: write
  id-token: write

# 避免多個部署任務同時進行導致衝突
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # 任務 1：打包
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        # 未來若有 API，需新增 env 區塊

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Discord Notification (Build)
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: '📦 Seasons Care 專案打包狀態'
          description: "分支: ${{ github.ref_name }}\n觸發者: ${{ github.actor }}"

  # 任務 2：部署
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build # 確保 build 成功後才執行部署
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Discord Notification （Deploy Job）
        if: always()
        # 確保無論部署成功或失敗，這一步都會執行
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: '🚀 Seasons Care 專案部署狀態'
          description: "分支: ${{ github.ref_name }}\n觸發者: ${{ github.actor }}"
          # 這個套件會自動根據 job.status 判斷要顯示綠色(成功)還是紅色(失敗)
