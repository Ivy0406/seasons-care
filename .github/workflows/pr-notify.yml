name: Discord PR Notification

on:
  pull_request:
    types: [opened, closed]

jobs:
  notify-pr-opened:
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve reviewer Discord ID
        id: resolver
        run: |
          case "${{ github.actor }}" in
            "Ivy0406") echo "discord_id=${{ secrets.DISCORD_HO }}" >> $GITHUB_OUTPUT ;;
            "howardxsheng-beep") echo "discord_id=${{ secrets.DISCORD_IVY }}" >> $GITHUB_OUTPUT ;;
            *) echo "discord_id=" >> $GITHUB_OUTPUT ;;
          esac

      - name: Send Discord Message (PR Opened)
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: success
          nodetail: true
          noprefix: true
          title: "📬 有新 PR 發出囉！"
          description: |
            👤 **誰發的:** `${{ github.actor }}`
            🌿 **分支:** `${{ github.event.pull_request.head.ref }}` → `${{ github.event.pull_request.base.ref }}`
            🔗 **PR 連結:** ${{ github.event.pull_request.html_url }}
            ${{ steps.resolver.outputs.discord_id != '' && format('<@{0}> 有新 PR 請審核！', steps.resolver.outputs.discord_id) || '' }}
          color: 0x3498db

  notify-pr-merged:
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Resolve author Discord ID
        id: resolver
        run: |
          case "${{ github.event.pull_request.user.login }}" in
            "Ivy0406") echo "discord_id=${{ secrets.DISCORD_IVY }}" >> $GITHUB_OUTPUT ;;
            "howardxsheng-beep") echo "discord_id=${{ secrets.DISCORD_HO }}" >> $GITHUB_OUTPUT ;;
            *) echo "discord_id=" >> $GITHUB_OUTPUT ;;
          esac

      - name: Send Discord Message (PR Merged)
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: success
          nodetail: true
          noprefix: true
          title: "🎉 PR 已合併！"
          description: |
            🤓 **誰合併的:** `${{ github.actor }}`
            👤 **誰發的:** `${{ github.event.pull_request.user.login }}`
            🌿 **分支:** `${{ github.event.pull_request.head.ref }}` → `${{ github.event.pull_request.base.ref }}`
            🔗 **PR 連結:** ${{ github.event.pull_request.html_url }}
            ${{ steps.resolver.outputs.discord_id != '' && format('<@{0}> 你的 PR 已合併！', steps.resolver.outputs.discord_id) || '' }}
          color: 0x9b59b6
